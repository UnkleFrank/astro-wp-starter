[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Set these in Netlify UI → Site → Environment variables:
#   WP_URL
#   WC_KEY       (if using WooCommerce)
#   WC_SECRET    (if using WooCommerce)

# ── Redirects ─────────────────────────────────────────────────────────────────

# Redirect wp-admin to the actual WP site (protects against accidental exposure)
[[redirects]]
  from   = "/wp-admin/*"
  to     = ":splat"
  status = 301
  force  = false

# ── Headers ───────────────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
